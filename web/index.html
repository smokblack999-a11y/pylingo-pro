<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>⚔ Samurai Ultimate v54</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0d13;--card:#111827;--card2:#1a2133;--border:#1f2d42;--blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--text:#e2e8f0;--dim:#64748b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.navbar{background:linear-gradient(90deg,#0f172a,#1e293b);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.logo{font-weight:800;font-size:1.05rem;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ws-indicator{display:flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--dim)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--red);transition:background .3s}
.ws-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.nav-tabs{display:flex;gap:.2rem;margin-left:auto;flex-wrap:wrap}
.tab{padding:.3rem .75rem;border-radius:6px;cursor:pointer;font-size:.8rem;color:var(--dim);border:1px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 20px rgba(59,130,246,0.3)}
.tab:hover:not(.active){background:var(--card2);color:var(--text)}
.content{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;padding:.75rem;display:none}
.panel.active{display:block}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem}
@media(max-width:600px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem;transition:border-color .2s}
.card:hover{border-color:var(--blue)}
.ct{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
.cv{font-size:1.5rem;font-weight:700;color:var(--blue2)}
.cs{font-size:.72rem;color:var(--dim);margin-top:.15rem}
.mb6{margin-bottom:.6rem}.mb4{margin-bottom:.4rem}
.row{display:flex;align-items:center;gap:.5rem}
.inp{background:#0f172a;border:1px solid var(--border);color:var(--text);padding:.4rem .75rem;border-radius:6px;font-size:.85rem;outline:none;width:100%}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.btn{padding:.4rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#dc2626}
.btn-dim{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-dim:hover{background:var(--border)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{color:var(--dim);font-weight:500;padding:.35rem .6rem;border-bottom:1px solid var(--border);text-align:left}
.tbl td{padding:.35rem .6rem;border-bottom:1px solid #111827}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.up{color:var(--green)}.dn{color:var(--red)}.nt{color:var(--dim)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:700}
.b-scale{background:#052e16;color:var(--green);border:1px solid #166534}
.b-use{background:#172554;color:var(--blue2);border:1px solid #1e40af}
.b-drop{background:#1c1917;color:var(--dim);border:1px solid #44403c}
.pbar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin-top:.3rem}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s}
.pf-scale{background:linear-gradient(90deg,var(--green),#4ade80)}
.pf-use{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.pf-drop{background:var(--dim)}
.logbox{font-family:'Courier New',monospace;font-size:.73rem;background:#050810;border:1px solid var(--border);border-radius:8px;padding:.6rem;height:160px;overflow-y:auto;color:var(--dim)}
.log-ok{color:var(--green)}.log-warn{color:var(--yellow)}.log-err{color:var(--red)}
.rca-step{display:flex;gap:.5rem;align-items:flex-start;margin-bottom:.4rem;font-size:.8rem}
.rca-num{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;margin-top:1px;font-weight:700}
#mol-mount{width:100%;height:calc(100vh - 200px);border-radius:10px;overflow:hidden;background:#050810;border:1px solid var(--border)}
.sugg{position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:2px;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.sugg-item{padding:.4rem .75rem;cursor:pointer;display:flex;justify-content:space-between;font-size:.82rem;border-bottom:1px solid var(--border)}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover{background:var(--card2)}
.empty-mol{display:flex;align-items:center;justify-content:center;flex-direction:column;height:calc(100vh - 200px);color:var(--dim)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.auth-wrap{max-width:360px;margin:5vh auto;padding:.5rem}
.auth-title{font-size:2rem;text-align:center;margin-bottom:.3rem}
.auth-sub{text-align:center;color:var(--dim);font-size:.8rem;margin-bottom:1.5rem}
.form-lbl{display:block;font-size:.75rem;color:var(--dim);margin-bottom:.25rem}
.form-row{margin-bottom:.8rem}
.alert{padding:.4rem .75rem;border-radius:6px;font-size:.8rem;margin-bottom:.4rem}
.alert-err{background:#2d0a0a;border:1px solid var(--red);color:#fca5a5}
.alert-ok{background:#052e16;border:1px solid var(--green);color:#86efac}
.alert-warn{background:#2d1a00;border:1px solid var(--yellow);color:#fde68a}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback}=React;
const API=window.location.origin;
let _ws=null;
const apiFetch=async(url,opts={},token=null)=>{const h={'Content-Type':'application/json'};if(token)h['Authorization']=`Bearer ${token}`;const r=await fetch(`${API}${url}`,{...opts,headers:{...h,...(opts.headers||{})}});if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||r.statusText)}return r.json()};
const AuthPanel=({onLogin})=>{const[form,setF]=useState({username:'admin',password:''});const[err,setErr]=useState('');const[busy,setBusy]=useState(false);const[mode,setMode]=useState('login');
const submit=async()=>{setBusy(true);setErr('');try{const endpoint=mode==='login'?'/login':'/register';const d=await apiFetch(endpoint,{method:'POST',body:JSON.stringify(form)});onLogin(d.token,d.role)}catch(e){setErr(e.message)}setBusy(false)};
return(<div className="auth-wrap"><div className="card"><div className="auth-title">⚔</div><div style={{textAlign:'center',marginBottom:'1.5rem'}}><div style={{fontWeight:800,fontSize:'1.3rem',background:'linear-gradient(135deg,#3b82f6,#a855f7)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Samurai Ultimate</div><div className="auth-sub">v54 Final · {mode==='login'?'Войти':'Регистрация'}</div></div><div className="form-row"><label className="form-lbl">Логин</label><input className="inp"value={form.username}onChange={e=>setF(p=>({...p,username:e.target.value}))}onKeyPress={e=>e.key==='Enter'&&submit()}placeholder="admin"/></div><div className="form-row"><label className="form-lbl">Пароль</label><input className="inp"type="password"value={form.password}onChange={e=>setF(p=>({...p,password:e.target.value}))}onKeyPress={e=>e.key==='Enter'&&submit()}placeholder="••••••••"/></div>{err&&<div className="alert alert-err mb4">{err}</div>}<button className="btn btn-blue"style={{width:'100%'}}onClick={submit}disabled={busy}>{busy?'⏳ Загрузка...':mode==='login'?'Войти':'Зарегистрироваться'}</button><div style={{textAlign:'center',marginTop:'.75rem',fontSize:'.75rem',color:'var(--dim)'}}><span style={{cursor:'pointer',color:'var(--blue2)'}}onClick={()=>{setMode(m=>m==='login'?'register':'login');setErr('');}}>{mode==='login'?'Нет аккаунта? Регистрация':'Уже есть аккаунт? Войти'}</span></div><div style={{fontSize:'.7rem',color:'var(--dim)',textAlign:'center',marginTop:'.5rem'}}>Дефолтный: admin / пароль из .env</div></div></div>)};
const StatCard=({title,value,sub,color='var(--blue2)',icon})=>(<div className="card"><div className="ct">{icon} {title}</div><div className="cv"style={{color}}>{value??'—'}</div>{sub&&<div className="cs">{sub}</div>}</div>);
const DashPanel=({token,wsRef})=>{const[core,setCore]=useState(null);const[market,setMkt]=useState([]);const[analytics,setAn]=useState(null);const[events,setEvs]=useState([]);
useEffect(()=>{const fetch_=async()=>{try{const[a,m]=await Promise.all([apiFetch('/api/analytics',{},token),apiFetch('/api/market',{},token)]);setAn(a);setCore(a.core);setMkt(m)}catch{}};fetch_();const t=setInterval(fetch_,30000);return()=>clearInterval(t)},[token]);
useEffect(()=>{if(!wsRef.current)return;const h=d=>{setCore(d);setEvs(e=>[{ts:Date.now(),...d},...e].slice(0,20))};wsRef.current.on('core_update',h);wsRef.current.on('core_state',h);return()=>{wsRef.current?.off('core_update',h);wsRef.current?.off('core_state',h);}},[wsRef.current]);
const simulate=async(status)=>{try{await apiFetch('/api/core/event',{method:'POST',body:JSON.stringify({status})},token)}catch{}};
const score=(ch)=>{const a=Math.abs(ch);return a>65?'SCALE':a>15?'USE':'DROP'};
const uptime=(s)=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return`${h}ч ${m}м`};
return(<div>{core&&<><div className="g4 mb6"><StatCard title="Событий"value={core.events}sub={`↑OK: ${core.ok}`}icon="📡"/><StatCard title="Восстановлено"value={core.recovered}color="var(--green)"icon="♻"/><StatCard title="Предотвр. убытки"value={`$${core.lossPrevented||0}`}color="var(--yellow)"icon="🛡"/><StatCard title="Аптайм"value={uptime(core.uptime||0)}color="var(--purple)"icon="⏱"/></div><div className="card mb6"><div className="row mb4"><span style={{fontWeight:600,fontSize:'.85rem'}}>⚡ Samurai Core — Live</span><div className="row"style={{marginLeft:'auto',gap:'.4rem'}}><button className="btn btn-green"style={{fontSize:'.72rem',padding:'.25rem .6rem'}}onClick={()=>simulate('ok')}>+OK</button><button className="btn btn-red"style={{fontSize:'.72rem',padding:'.25rem .6rem'}}onClick={()=>simulate('fail')}>+Fail</button></div></div><div className="logbox">{events.length===0&&<span className="nt">Ожидание событий...</span>}{events.map((e,i)=>(<div key={i}className={e.fails>0?'log-warn':'log-ok`}>{`[${new Date(e.ts).toLocaleTimeString()}] events:${e.events} fails:${e.fails} rec:${e.recovered}`}</div>))}</div></div></>}{analytics&&<div className="g3 mb6"><StatCard title="Пользователи"value={analytics.users}sub={`FREE:${analytics.plans?.free||0} PRO:${analytics.plans?.pro||0}`}icon="👥"/><StatCard title="Redis keys"value={analytics.cache_keys}icon="🗄"/><StatCard title="Задачи"value={(analytics.jobs?.active||0)+(analytics.jobs?.failed||0)}icon="📋"/></div>}<div className="card"><div className="row mb4"><span style={{fontWeight:600,fontSize:'.85rem'}}>📊 Binance Top 12</span><span style={{fontSize:'.7rem',color:'var(--dim)',marginLeft:'auto'}}>Только чтение · кэш 60с</span></div>{market.length>0?(<table className="tbl"><thead><tr><th>Пара</th><th>Цена</th><th>24h%</th><th>Объём M</th><th>Сигнал</th></tr></thead><tbody>{market.map(a=>{const s=score(a.change);return(<tr key={a.symbol}><td style={{fontFamily:'monospace',fontWeight:700}}>{a.symbol}</td><td style={{fontFamily:'monospace'}}>{a.price>100?a.price.toFixed(2):a.price.toFixed(6)}</td><td className={a.change>0?'up':a.change<0?'dn':'nt'}>{a.change>0?'+':''}{a.change.toFixed(2)}%</td><td style={{color:'var(--dim)'}}>{(a.volume/1e6).toFixed(1)}</td><td><span className={`badge b-${s.toLowerCase()}`}>{s}</span></td></tr>)})}</tbody></table>):<div style={{color:'var(--dim)',fontSize:'.82rem',textAlign:'center',padding:'1rem'}}>Загрузка данных Binance...</div>}</div></div>)};
const MolPanel=({token})=>{const[name,setName]=useState('');const[data,setData]=useState(null);const[loading,setLoading]=useState(false);const[err,setErr]=useState('');const[sugg,setSugg]=useState(false);const mountRef=useRef(null);const sceneRef=useRef(null);const rendRef=useRef(null);const camRef=useRef(null);const frmRef=useRef(null);const rotRef=useRef(false);
const MOLS=[{n:'water',f:'H₂O'},{n:'methane',f:'CH₄'},{n:'ammonia',f:'NH₃'},{n:'ethylene',f:'C₂H₄'},{n:'CO2',f:'CO₂'},{n:'caffeine',f:'C₈H₁₀N₄O₂'},{n:'aspirin',f:'C₉H₈O₄'},{n:'glucose',f:'C₆H₁₂O₆'},{n:'ethanol',f:'C₂H₅OH'},{n:'benzene',f:'C₆H₆'},{n:'acetone',f:'C₃H₆O'},{n:'urea',f:'CH₄N₂O'}];
const init3D=useCallback(()=>{if(!mountRef.current)return;const el=mountRef.current;const scene=new THREE.Scene();scene.background=new THREE.Color(0x050810);const w=el.clientWidth||320,h=el.clientHeight||480;const cam=new THREE.PerspectiveCamera(75,w/h,0.1,1000);cam.position.set(0,0,10);const rend=new THREE.WebGLRenderer({antialias:true});rend.setSize(w,h);rend.setPixelRatio(Math.min(devicePixelRatio,2));el.appendChild(rend.domElement);scene.add(new THREE.AmbientLight(0x404060,0.8));const d=new THREE.DirectionalLight(0xffffff,1.2);d.position.set(5,5,5);d.castShadow=true;scene.add(d);const d2=new THREE.DirectionalLight(0x4080ff,0.4);d2.position.set(-5,-2,-5);scene.add(d2);sceneRef.current=scene;rendRef.current=rend;camRef.current=cam;let mD=false,mX=0,mY=0;const oD=e=>{mD=true;mX=e.clientX;mY=e.clientY;rotRef.current=false;};const oU=()=>mD=false;const oM=e=>{if(!mD||!sceneRef.current)return;sceneRef.current.rotation.y+=(e.clientX-mX)*.012;sceneRef.current.rotation.x+=(e.clientY-mY)*.012;mX=e.clientX;mY=e.clientY;};const oW=e=>{if(!camRef.current)return;camRef.current.position.z+=e.deltaY*.01;camRef.current.position.z=Math.max(1.5,Math.min(60,camRef.current.position.z));};rend.domElement.addEventListener('mousedown',oD);rend.domElement.addEventListener('mouseup',oU);rend.domElement.addEventListener('mousemove',oM);rend.domElement.addEventListener('wheel',oW,{passive:true});const loop=()=>{frmRef.current=requestAnimationFrame(loop);if(rotRef.current&&sceneRef.current)sceneRef.current.rotation.y+=.006;rend.render(scene,cam);};loop();},[]);
useEffect(()=>{init3D();const onR=()=>{if(!rendRef.current||!camRef.current||!mountRef.current)return;const w=mountRef.current.clientWidth,h=mountRef.current.clientHeight;rendRef.current.setSize(w,h);camRef.current.aspect=w/h;camRef.current.updateProjectionMatrix();};window.addEventListener('resize',onR);return()=>{window.removeEventListener('resize',onR);if(frmRef.current)cancelAnimationFrame(frmRef.current);if(rendRef.current&&mountRef.current){try{mountRef.current.removeChild(rendRef.current.domElement)}catch{}rendRef.current.dispose();}},[]);
const clearMol=()=>{if(!sceneRef.current)return;const rm=[];sceneRef.current.traverse(c=>{if(c.isMesh&&c.userData.m)rm.push(c)});rm.forEach(o=>{sceneRef.current.remove(o);o.geometry?.dispose();o.material?.dispose();})};
const renderMol=(d)=>{if(!sceneRef.current)return;clearMol();const aMap=new Map();d.atoms.forEach(a=>{const el=d.elements[a.element];if(!el)return;const c=parseInt(el.color.replace('#','0x'));const mesh=new THREE.Mesh(new THREE.SphereGeometry(el.radius,32,32),new THREE.MeshPhongMaterial({color:c,shininess:80,specular:0x444444}));const[x,y,z]=a.position;mesh.position.set(x,y,z);mesh.castShadow=true;mesh.userData={m:true};sceneRef.current.add(mesh);aMap.set(a.id,a)});d.bonds.forEach(b=>{const a1=aMap.get(b.atom1),a2=aMap.get(b.atom2);if(!a1||!a2)return;const s=new THREE.Vector3(...a1.position),e=new THREE.Vector3(...a2.position);const dist=s.distanceTo(e),mid=new THREE.Vector3().copy(s).add(e).divideScalar(2);const dir=new THREE.Vector3().subVectors(e,s);const perp=Math.abs(dir.y)<0.9?new THREE.Vector3(0,1,0).cross(dir).normalize():new THREE.Vector3(1,0,0).cross(dir).normalize();const addC=(off)=>{const cyl=new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,dist,10),new THREE.MeshPhongMaterial({color:0x4080cc,shininess:60}));cyl.position.copy(mid);if(off)cyl.position.add(off);cyl.lookAt(e);cyl.rotateX(Math.PI/2);cyl.userData={m:true};sceneRef.current.add(cyl);};if(b.type==='single')addC(null);else if(b.type==='double'){addC(perp.clone().multiplyScalar(.1));addC(perp.clone().multiplyScalar(-.1))}else{addC(null);addC(perp.clone().multiplyScalar(.09));addC(perp.clone().multiplyScalar(-.09))}});const box=new THREE.Box3().setFromObject(sceneRef.current);const cen=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3());sceneRef.current.position.sub(cen);const fov=camRef.current.fov*Math.PI/180;const camZ=Math.abs(Math.max(sz.x,sz.y,sz.z)/(2*Math.tan(fov/2)))*1.6;camRef.current.position.set(0,0,Math.max(camZ,2.5));camRef.current.lookAt(0,0,0);rotRef.current=true;};
const load=async(mol)=>{setLoading(true);setErr('');setSugg(false);try{const d=await apiFetch('/molecule',{method:'POST',body:JSON.stringify({molecule:mol})});if(!d.formula||!d.atoms)throw new Error('Неверная структура');setData(d);renderMol(d)}catch(e){setErr(e.message)}setLoading(false);};
return(<div><div style={{marginBottom:'.6rem',position:'relative'}}><div className="row"><div style={{flex:1,position:'relative'}}><input className="inp"value={name}onChange={e=>setName(e.target.value)}onFocus={()=>setSugg(true)}onBlur={()=>setTimeout(()=>setSugg(false),200)}onKeyPress={e=>e.key==='Enter'&&name.trim()&&load(name.trim())}placeholder="Введи молекулу: water, caffeine, aspirin..."/>{sugg&&<div className="sugg">{MOLS.map(m=><div key={m.n}className="sugg-item"onMouseDown={()=>{setName(m.n);load(m.n);}}><span style={{textTransform:'capitalize'}}>{m.n}</span><span style={{color:'var(--dim)',fontSize:'.75rem'}}>{m.f}</span></div>)}</div>}</div><button className="btn btn-blue"onClick={()=>name.trim()&&load(name.trim())}disabled={loading}>{loading?<span className="spin">⚛</span>:'⚛ Визуализировать'}</button></div></div>{err&&<div className="alert alert-err mb4">{err}</div>}{data&&<div style={{fontSize:'.77rem',color:'var(--dim)',marginBottom:'.4rem'}}><b style={{color:'var(--text)'}}>{data.formula}</b> · {data.atoms.length} атомов · {data.bonds.length} связей</div>}<div id="mol-mount"ref={mountRef}>{!data&&!loading&&<div className="empty-mol"><div style={{fontSize:'3rem',marginBottom:'.5rem'}}>⚛</div><div style={{fontWeight:300,fontSize:'1.1rem'}}>Введи название молекулы</div><div style={{fontSize:'.8rem',marginTop:'.3rem',color:'var(--dim)'}}>water · methane · caffeine · glucose · aspirin · benzene</div></div>}{loading&&<div className="empty-mol"><div style={{fontSize:'2.5rem',marginBottom:'.5rem'}}className="spin">⚛</div><div>Генерация 3D структуры...</div></div>}</div></div>)};
const TrendsPanel=({token,wsRef})=>{const[trends,setTrends]=useState([]);const[loading,setLoading]=useState(false);const[summary,setSummary]=useState(null);
const load=async()=>{setLoading(true);try{const d=await apiFetch('/api/trends',{},token);setTrends(d);const scale=d.filter(t=>t.action==='SCALE').length,use=d.filter(t=>t.action==='USE').length,drop=d.filter(t=>t.action==='DROP').length;setSummary({scale,use,drop,topScore:d[0]?.score||0,topTitle:d[0]?.title||'—'})}catch{}setLoading(false)};
useEffect(()=>{load();const t=setInterval(load,120000);return()=>clearInterval(t)},[]);
useEffect(()=>{if(!wsRef.current)return;const h=d=>{if(Array.isArray(d)){setTrends(d);}};wsRef.current.on('trends_update',h);return()=>wsRef.current?.off('trends_update',h)},[wsRef.current]);
const fmtVol=v=>v>1e9?(v/1e9).toFixed(1)+'B':v>1e6?(v/1e6).toFixed(1)+'M':v?v.toFixed(0):'—';
return(<div>{summary&&<div className="g4 mb6"><StatCard title="SCALE 🚀"value={summary.scale}color="var(--green)"sub="Масштабировать"/><StatCard title="USE 📊"value={summary.use}color="var(--blue2)"sub="Использовать"/><StatCard title="DROP 🔻"value={summary.drop}color="var(--dim)"sub="Игнорировать"/><StatCard title="Топ-тренд"value={`${summary.topScore}%`}color="var(--yellow)"sub={summary.topTitle}/></div>}<div className="card mb6"><div className="row mb4"><span style={{fontWeight:700,fontSize:'.9rem'}}>📈 Viral Trend Engine</span><span style={{fontSize:'.7rem',color:'var(--dim)',marginLeft:'auto'}}>Скоринг SCALE/USE/DROP</span><button className="btn btn-dim"style={{fontSize:'.72rem',padding:'.2rem .5rem'}}onClick={load}disabled={loading}>{loading?'...':'↻'}</button></div>{trends.map(t=>(<div key={t.id}style={{marginBottom:'.6rem',padding:'.5rem',background:'var(--card2)',borderRadius:'8px',border:'1px solid var(--border)'}}><div className="row mb4"><div><div style={{fontWeight:600,fontSize:'.85rem'}}>{t.title}</div>{t.subtitle&&<div style={{fontSize:'.72rem',color:'var(--dim)'}}>{t.subtitle}</div>}</div><div style={{marginLeft:'auto',display:'flex',gap:'.4rem',alignItems:'center'}}><span style={{fontWeight:700,fontSize:'.9rem',color:t.action==='SCALE'?'var(--green)':t.action==='USE'?'var(--blue2)':'var(--dim)'}}>{t.score}%</span><span className={`badge b-${t.action.toLowerCase()}`}>{t.action}</span></div></div><div className="pbar"><div className={`pbar-fill pf-${t.action.toLowerCase()}`}style={{width:`${t.score}%`}}/></div>{t.volume&&<div style={{fontSize:'.7rem',color:'var(--dim)',marginTop:'.2rem'}}>Объём: {fmtVol(t.volume)}</div>}</div>))}</div></div>)};
const RCAPanel=({token})=>{const[result,setResult]=useState(null);const[loading,setLoading]=useState(false);const[wh,setWh]=useState(null);const[whLoading,setWhLoading]=useState(false);
const runRCA=async()=>{setLoading(true);try{setResult(await apiFetch('/api/rca/run',{method:'POST'},token))}catch(e){setResult({error:e.message})}setLoading(false)};
const simWebhook=async()=>{setWhLoading(true);try{await apiFetch('/api/webhook/simulate',{method:'POST'},token);setWh(await apiFetch('/api/webhook/report',{},token))}catch{}setWhLoading(false)};
useEffect(()=>{apiFetch('/api/rca',{},token).then(setResult).catch(()=>{});apiFetch('/api/webhook/report',{},token).then(setWh).catch(()=>{})},[]);
const statusColor=(anomaly)=>anomaly?'var(--red)':'var(--green)';
return(<div><div className="g2 mb6"><div className="card"><div className="ct">🔍 Root Cause Analysis</div><div style={{fontSize:'.8rem',color:'var(--dim)',marginBottom:'.6rem'}}>Паттерн OpenRCA: anomaly detection → fault identification → root cause localization</div><button className="btn btn-blue"onClick={runRCA}disabled={loading}style={{width:'100%'}}>{loading?'⏳ Анализ...':'▶ Запустить RCA диагностику'}</button></div><div className="card"><div className="ct">🔗 Webhook Monitor</div><div style={{fontSize:'.8rem',color:'var(--dim)',marginBottom:'.6rem'}}>classify→retry→fallback→incident report</div><button className="btn btn-dim"onClick={simWebhook}disabled={whLoading}style={{width:'100%'}}>{whLoading?'⏳ Симуляция...':'⚡ Симулировать webhook событие'}</button></div></div>{result&&!result.error&&<div className="card mb6"><div className="row mb4"><span style={{fontWeight:700}}>📊 Результат RCA</span><span style={{marginLeft:'auto',fontWeight:700,color:statusColor(result.anomaly)}}>{result.anomaly?'🚨 АНОМАЛИЯ':'✅ НОРМА'}</span></div><div className="g2 mb4"><div style={{background:'var(--card2)',borderRadius:'6px',padding:'.5rem'}}><div className="ct">События в окне</div><div style={{fontWeight:700}}>{result.window_events}</div></div><div style={{background:'var(--card2)',borderRadius:'6px',padding:'.5rem'}}><div className="ct">Fail rate</div><div style={{fontWeight:700,color:result.anomaly?'var(--red)':'var(--green)'}}>{result.fail_rate}</div></div></div>{result.root_cause&&<div className="alert alert-warn mb4">🎯 Root cause: <b>{result.root_cause}</b> · {result.reason}</div>}{(result.analysis_steps||[]).map((s,i)=>(<div key={i}className="rca-step"><div className="rca-num">{i+1}</div><div style={{color:'var(--dim)',fontSize:'.78rem'}}>{s}</div></div>))}{result.recommendation&&<div className="alert alert-ok">💡 {result.recommendation}</div>}</div>}{wh&&<div className="card"><div style={{fontWeight:700,marginBottom:'.5rem'}}>📋 Webhook Incident Report</div><table className="tbl"><tbody><tr><td style={{color:'var(--dim')}}>Всего событий</td><td>{wh.total_events}</td></tr><tr><td style={{color:'var(--dim')}}>Сбои / Восст.</td><td><span style={{color:'var(--red)'}}>{wh.failed}</span> / <span style={{color:'var(--green)'}}>{wh.recovered}</span></td></tr><tr><td style={{color:'var(--dim')}}>Success rate</td><td style={{color:'var(--green)'}}>{wh.success_rate}</td></tr>{wh.mttr_seconds&&<tr><td style={{color:'var(--dim')}}>MTTR</td><td>{wh.mttr_seconds}с</td></tr>}<tr><td style={{color:'var(--dim')}}>Рекомендация</td><td style={{fontSize:'.78rem'}}>{wh.recommendation}</td></tr></tbody></table></div></div>)};
const AdminPanel=({token})=>{const[stats,setStats]=useState(null);const[taskUrl,setTaskUrl]=useState('');const[taskMsg,setTaskMsg]=useState('');const[busy,setBusy]=useState(false);
const load=async()=>{try{setStats(await apiFetch('/admin/stats',{},token))}catch{}};useEffect(()=>{load();const t=setInterval(load,20000);return()=>clearInterval(t)},[]);
const addTask=async()=>{if(!taskUrl.trim())return;setBusy(true);try{const d=await apiFetch('/api/task',{method:'POST',body:JSON.stringify({url:taskUrl,type:'manual'})},token);setTaskMsg(`✅ Задача ${d.jobId} добавлена`);setTaskUrl('')}catch(e){setTaskMsg('❌ '+e.message)}setBusy(false);setTimeout(()=>setTaskMsg(''),4000)};
const planColors={free:'var(--dim)',pro:'var(--blue2)',max:'var(--purple)'};
return(<div><div className="card mb6"><div style={{fontWeight:700,marginBottom:'.6rem'}}>📋 BullMQ — Добавить задачу</div><div className="row mb4"><input className="inp"value={taskUrl}onChange={e=>setTaskUrl(e.target.value)}placeholder="URL (только разрешённые хосты)"onKeyPress={e=>e.key==='Enter'&&addTask()}/><button className="btn btn-blue"onClick={addTask}disabled={busy}>{busy?'...':'+ Задача'}</button></div>{taskMsg&&<div className={`alert ${taskMsg.startsWith('✅')?'alert-ok':'alert-err'}`}>{taskMsg}</div>}<div style={{fontSize:'.73rem',color:'var(--dim)'}}>Allowlist: api.binance.com · api.coingecko.com</div></div>{stats&&<><div className="card mb6"><div style={{fontWeight:700,marginBottom:'.5rem'}}>👥 Пользователи ({stats.users?.length})</div><table className="tbl"><thead><tr><th>ID</th><th>Логин</th><th>Роль</th><th>План</th><th>Действий</th><th>Заработано</th></tr></thead><tbody>{(stats.users||[]).map(u=>(<tr key={u.id}><td style={{color:'var(--dim)',fontFamily:'monospace'}}>{u.id}</td><td style={{fontWeight:600}}>{u.username}</td><td><span className="badge"style={{background:u.role==='admin'?'#2d1657':'var(--card2)',color:u.role==='admin'?'var(--purple)':'var(--dim)'}}>{u.role}</span></td><td><span className="badge"style={{color:planColors[u.plan]||'var(--dim)'}}>{u.plan.toUpperCase()}</span></td><td>{u.actions}</td><td style={{color:'var(--green)'}}>{u.earned||0}₸</td></tr>))}</tbody></table></div><div className="g2 mb6"><StatCard title="Задач в очереди"value={stats.total_jobs}icon="📋"/><StatCard title="Redis"value={stats.redis_ready?'Подключён':'Оффлайн'}color={stats.redis_ready?'var(--green)':'var(--red)'}icon="🗄"/></div>{stats.rca&&<div className="card"><div style={{fontWeight:700,marginBottom:'.4rem'}}>🔍 Текущий RCA статус</div><div style={{fontSize:'.8rem',color:stats.rca.anomaly?'var(--red)':'var(--green)'}}>{stats.rca.anomaly?'🚨 Обнаружена аномалия':'✅ Система в норме'} · Fail rate: {stats.rca.fail_rate} · Тренд: {stats.rca.trend}</div>{stats.rca.root_cause&&<div style={{fontSize:'.78rem',color:'var(--yellow)',marginTop:'.3rem'}}>Root cause: {stats.rca.root_cause} → {stats.rca.reason}</div>}</div>}</>}</div>)};
const App=()=>{const[token,setToken]=useState(()=>localStorage.getItem('sm_tk')||'');const[role,setRole]=useState(()=>localStorage.getItem('sm_rl')||'');const[tab,setTab]=useState('dash');const[ws,setWs]=useState(null);const[wsOn,setWsOn]=useState(false);const wsRef=useRef(null);
const login=(t,r)=>{localStorage.setItem('sm_tk',t);localStorage.setItem('sm_rl',r);setToken(t);setRole(r);};
const logout=()=>{localStorage.removeItem('sm_tk');localStorage.removeItem('sm_rl');setToken('');setRole('');wsRef.current?.disconnect();};
useEffect(()=>{if(!token)return;const s=io(API,{transports:['websocket','polling']});wsRef.current=s;setWs(s);s.on('connect',()=>setWsOn(true));s.on('disconnect',()=>setWsOn(false));return()=>s.disconnect();},[token]);
if(!token)return<AuthPanel onLogin={login/>;
const TABS=[{id:'dash',label:'📊 Дашборд'},{id:'mol',label:'⚛ Молекулы'},{id:'trends',label:'📈 Тренды'},{id:'rca',label:'🔍 RCA'}];if(role==='admin')TABS.push({id:'admin',label:'👑 Админ'});
return(<div className="app"><div className="navbar"><div className="logo">⚔ SAMURAI v54</div><div className="ws-indicator"><div className={`ws-dot${wsOn?' on':''}`}/>{wsOn?'Live':'Offline'}</div><div className="nav-tabs">{TABS.map(t=>(<div key={t.id}className={`tab${tab===t.id?' active':''}`}onClick={()=>setTab(t.id)}>{t.label}</div>))}<div className="tab"onClick={logout}>Выход</div></div></div><div className="content"><div className={`panel${tab==='dash'?' active':''}`}><DashPanel token={token}wsRef={wsRef}/></div><div className={`panel${tab==='mol'?' active':''}`}><MolPanel token={token}/></div><div className={`panel${tab==='trends'?' active':''}`}><TrendsPanel token={token}wsRef={wsRef}/></div><div className={`panel${tab==='rca'?' active':''}`}><RCAPanel token={token}/></div>{role==='admin'&&<div className={`panel${tab==='admin'?' active':''}`}><AdminPanel token={token}/></div>}</div></div>)};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
